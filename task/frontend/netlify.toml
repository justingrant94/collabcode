# ─────────────────────────────────────────────────────────────
# netlify.toml — Netlify deploy config for the frontend
#
# When linking the GitHub repo on Netlify:
#   1. Base directory: frontend
#   2. Build command: npm run build
#   3. Publish directory: dist
#   4. Add env vars in the Netlify UI:
#        VITE_API_URL                  → https://your-backend.fly.dev
#        VITE_CLERK_PUBLISHABLE_KEY    → pk_live_...
#
# The SPA redirect below ensures client-side React Router routes
# (e.g. /r/<roomId>) all resolve to index.html.
# ─────────────────────────────────────────────────────────────

[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — every unknown path returns index.html with 200.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
