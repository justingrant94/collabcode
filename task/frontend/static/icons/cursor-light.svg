<?xml version="1.0" encoding="UTF-8"?>
<!--
  cursor-light.svg — default cursor for LIGHT theme.
  Same composition as cursor.svg but the caret line is dark
  (visible on light backgrounds) while keeping the badge fill.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">
  <defs>
    <filter id="badgeShadowL" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#000" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect x="1" y="1" width="14" height="14" rx="3.5" fill="#6D4DF7" filter="url(#badgeShadowL)" />

  <g fill="#FFFFFF">
    <path d="M7 5.5
             A2.6 2.6 0 1 0 7 10.5
             L7 9.2
             A1.4 1.4 0 1 1 7 6.8
             Z" />
    <rect x="8.2" y="5.4" width="0.9" height="5.2" rx="0.3" />
    <rect x="8.2" y="5.4" width="3.0" height="0.9" rx="0.3" />
    <rect x="8.2" y="7.6" width="2.3" height="0.9" rx="0.3" />
    <rect x="8.2" y="9.7" width="3.0" height="0.9" rx="0.3" />
  </g>

  <!-- Caret line in dark for light backgrounds -->
  <line x1="4" y1="15.5" x2="4" y2="26" stroke="#18181B" stroke-width="1.6" stroke-linecap="round" />
  <line x1="2.5" y1="26" x2="5.5" y2="26" stroke="#18181B" stroke-width="1.4" stroke-linecap="round" />
</svg>
