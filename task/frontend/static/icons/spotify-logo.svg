<!--
  spotify-logo.svg — Spotify icon-mark (official simplified glyph).

  IMPORTANT — Spotify brand compliance:
    * This glyph must NEVER be recoloured to anything other than
      Spotify Green (#1DB954 / #1ED760), white, or black.
    * Must NEVER be rotated, distorted, or combined with other
      logos within the same mark.
    * When used as a button, pair only with one of these labels:
      "Log in with Spotify", "Connect with Spotify",
      "Continue with Spotify".

  This file ships the glyph in solid white so it can be placed on
  the Spotify Green button background. For other backgrounds use
  currentColor by setting fill="currentColor" and inheriting via
  CSS color.
-->
