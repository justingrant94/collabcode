<?xml version="1.0" encoding="UTF-8"?>
<!--
  favicon.svg — CollabCode "CE" monogram
  Rounded-square mark on accent background.
  Theme-aware: light browser chrome flips to a darker variant
  via an embedded prefers-color-scheme media query.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="CollabCode">
  <style>
    .bg     { fill: #7C5CFC; }      /* accent — dark mode default */
    .letter { fill: #FFFFFF; }
    @media (prefers-color-scheme: light) {
      .bg     { fill: #6D4DF7; }    /* slightly darker for light browser chrome */
      .letter { fill: #FFFFFF; }
    }
  </style>

  <!-- Background tile -->
  <rect class="bg" x="0" y="0" width="64" height="64" rx="14" />

  <!-- C glyph — minimal arc -->
  <path class="letter"
        d="M30 18
           A14 14 0 1 0 30 46
           L30 40
           A8 8 0 1 1 30 24
           Z" />

  <!-- E glyph — three bars -->
  <rect class="letter" x="36" y="18" width="4" height="28" rx="1.5" />
  <rect class="letter" x="36" y="18" width="14" height="4" rx="1.5" />
  <rect class="letter" x="36" y="30" width="11" height="4" rx="1.5" />
  <rect class="letter" x="36" y="42" width="14" height="4" rx="1.5" />
</svg>
