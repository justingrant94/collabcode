<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="description" content="CollabCode — real-time collaborative code editor with built-in execution, snippets, and a synced DJ booth." />

    <title>CollabCode</title>

    <!-- ─── Favicon (CE monogram, theme-aware via SVG) ─── -->
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/favicon.svg" />

    <!-- ─── Fonts: Inter (UI) + JetBrains Mono (code) ───
         preconnect → faster initial render; only the weights
         actually used by --font-* tokens are requested. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />

    <!--
      ─── No-FOUC theme bootstrap ───────────────────────────────
      Runs BEFORE React mounts so the page never flashes the
      wrong theme on first paint. Same storage key + attribute
      used by useTheme.js so the two stay in sync.
    -->
    <script>
      (function () {
        try {
          var KEY = 'collab.theme';
          var stored = localStorage.getItem(KEY);
          var theme =
            stored === 'dark' || stored === 'light'
              ? stored
              : window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (_e) {
          /* localStorage unavailable (private mode) — fall back to default */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
